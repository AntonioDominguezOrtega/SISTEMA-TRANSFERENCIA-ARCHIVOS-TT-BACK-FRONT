<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${subject}">Notificación</title>
</head>
<body style="margin:0;padding:0;background-color:#131924;color:#ffffff;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#131924;padding:40px 0;">
    <tr>
        <td align="center">
            <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;border-radius:16px;overflow:hidden;background-color:#1D263C;border:1px solid #0a3fff;box-shadow:0 0 20px rgba(10, 63, 255, 0.35);">
                <tr>
                    <td style="background-color:#0a3fff;padding:25px 20px;text-align:center;">
                        <p style="margin:0 0 5px;color:rgba(255,255,255,0.8);font-size:12px;letter-spacing:2px;text-transform:uppercase;">Notificación del Sistema</p>
                        <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;" th:text="${subject}">Nuevo Mensaje</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:40px 30px;">
                        <p style="margin:0 0 20px;font-size:16px;color:#ffffff;">Hola <span th:text="${nombre}">Usuario</span>,</p>
                        
                        <div style="background-color:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:25px;margin-bottom:25px;">
                            <p style="margin:0;font-size:15px;color:#A0ABC0;line-height:1.7;white-space:pre-line;" th:text="${message}">Aquí va el contenido dinámico del correo.</p>
                        </div>
                        
                        <p style="margin:0;font-size:13px;color:#888888;line-height:1.5;">Si consideras que esta notificación es un error, por favor contacta a soporte.</p>
                    </td>
                </tr>
                <tr>
                    <td style="background-color:rgba(0,0,0,0.2);padding:20px;text-align:center;border-top:1px solid rgba(255,255,255,0.05);">
                        <p style="margin:0;font-size:12px;color:#888888;">Plataforma de Transferencia Segura</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
