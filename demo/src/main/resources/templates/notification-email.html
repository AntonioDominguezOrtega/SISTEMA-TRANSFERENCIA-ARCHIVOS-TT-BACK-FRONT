<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${asunto}">Notificación del Sistema</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px;">

<table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">

    <tr>
        <td style="background-color: #2c3e50; padding: 20px; text-align: center;">
            <h2 style="color: #ffffff; margin: 0; font-size: 20px;" th:text="${asunto}">
                Aviso Importante
            </h2>
        </td>
    </tr>

    <tr>
        <td style="padding: 30px;">
            <p style="color: #333333; font-size: 16px; line-height: 1.6; margin: 0; white-space: pre-line;" th:text="${message}">
                Aquí va el contenido dinámico del mensaje. Los saltos de línea se respetarán automáticamente gracias al CSS.
            </p>
        </td>
    </tr>

    <tr>
        <td style="background-color: #f8f9fa; padding: 15px; text-align: center; border-top: 1px solid #eeeeee;">
            <p style="color: #888888; font-size: 12px; margin: 0;">
                Este es un mensaje automático de tu Plataforma de Transferencia Segura. <br>
                Por favor, no respondas a este correo.
            </p>
        </td>
    </tr>

</table>

</body>
</html>
