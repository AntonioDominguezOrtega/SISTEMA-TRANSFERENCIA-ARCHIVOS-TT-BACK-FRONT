<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="">Notificación</title>
</head>
<body style="margin:0;padding:0;background:#090b14;color:#e2e8f0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#090b14;padding:40px 0;">
    <tr>
        <td align="center">
            <table width="100%" cellpadding="0" cellspacing="0" style="max-width:680px;border-radius:22px;overflow:hidden;background:#0f172a;box-shadow:0 20px 60px rgba(0,0,0,0.35);border:1px solid rgba(147,197,253,0.12);">
                <tr>
                    <td style="background:linear-gradient(135deg,#2563eb,#0ea5e9);padding:32px 30px;text-align:center;">
                        <p style="margin:0;color:rgba(255,255,255,0.85);font-size:13px;letter-spacing:0.16em;text-transform:uppercase;">Notificación segura</p>
                        <h1 style="margin:12px 0 0;color:#ffffff;font-size:28px;line-height:1.1;" th:text="">Nuevo mensaje</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:30px 32px 24px 32px;">
                        <p style="margin:0 0 20px;font-size:16px;line-height:1.8;color:#cbd5e1;">Hola,</p>
                        <div style="background:#111827;border:1px solid rgba(148,163,184,0.15);border-radius:18px;padding:24px;margin-bottom:28px;">
                            <p style="margin:0;font-size:16px;line-height:1.75;color:#e2e8f0;white-space:pre-line;" th:text="">Aquí va el contenido dinámico del correo.</p>
                        </div>
                        <p style="margin:0 0 16px;color:#94a3b8;font-size:14px;line-height:1.7;">Si no reconoces esta actividad, revisa tu cuenta inmediatamente.</p>
                    </td>
                </tr>
                <tr>
                    <td style="background:#111827;padding:22px 32px 30px 32px;border-top:1px solid rgba(148,163,184,0.1);">
                        <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.7;">Plataforma de Transferencia Segura • Email automático</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</html>
