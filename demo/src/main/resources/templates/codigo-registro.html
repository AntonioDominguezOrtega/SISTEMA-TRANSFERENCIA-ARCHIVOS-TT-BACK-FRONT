<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Código de Verificación</title>
</head>
<body style="margin:0;padding:0;background-color:#131924;color:#ffffff;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#131924;padding:40px 0;">
    <tr>
        <td align="center">
            <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;border-radius:16px;overflow:hidden;background-color:#1D263C;border:1px solid #0a3fff;box-shadow:0 0 20px rgba(10, 63, 255, 0.35);">
                <tr>
                    <td style="background-color:#0a3fff;padding:30px 20px;text-align:center;">
                        <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:700;">Verificación de Seguridad</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:40px 30px;">
                        <p style="margin:0 0 15px;font-size:16px;color:#ffffff;">Hola <span th:text="${nombre}">Usuario</span>,</p>
                        <p style="margin:0 0 25px;font-size:15px;color:#A0ABC0;line-height:1.6;" th:text="${messageIntro}">Este es tu código para verificar tu correo.</p>
                        
                        <div style="background-color:rgba(10, 63, 255, 0.05);border:2px dashed #0a3fff;border-radius:12px;padding:25px;text-align:center;margin-bottom:25px;">
                            <p style="margin:0;font-size:36px;letter-spacing:8px;color:#46A2FD;font-weight:700;" th:text="${code}">000000</p>
                        </div>
                        
                        <p style="margin:0 0 10px;font-size:14px;color:#A0ABC0;text-align:center;">Este código es válido por <strong style="color:#ffffff;"><span th:text="${expirationMinutes}">10</span> minutos</strong>.</p>
                        <p style="margin:0;font-size:13px;color:#888888;line-height:1.5;text-align:center;">Si no solicitaste este código, puedes ignorar este mensaje de forma segura.</p>
                    </td>
                </tr>
                <tr>
                    <td style="background-color:rgba(0,0,0,0.2);padding:20px;text-align:center;border-top:1px solid rgba(255,255,255,0.05);">
                        <p style="margin:0;font-size:12px;color:#888888;">Plataforma de Transferencia Segura • Mensaje Automático</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
