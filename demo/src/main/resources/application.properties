spring.application.name=TT_Login

# --- Configuraciï¿½n de la Fuente de Datos (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/auth_sms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username={TU_USUARIO_BD}
spring.datasource.password={TU_PASSWORD_BD}

# Driver especï¿½fico para MySQL (opcional en versiones nuevas, pero recomendado para documentar)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuraciï¿½n de JPA / Hibernate ---
# Muestra las consultas SQL en la consola (ï¿½til para depurar)
spring.jpa.show-sql=true

# Actualiza el esquema de la base de datos automï¿½ticamente (crea tablas si no existen)
spring.jpa.hibernate.ddl-auto=update

# Especifica el dialecto para que Hibernate genere SQL optimizado para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Configuraciï¿½n JWT ---
# La clave secreta debe ser larga y compleja (mï¿½nimo 32 caracteres/256 bits)
app.jwt.secret={TU_JWT_SECRET_AQUI}
# Tiempo de expiraciï¿½n en milisegundos (Ejemplo: 86400000 ms = 24 horas)
app.jwt.expiration-ms=86400000

# --- Configuraciï¿½n de Twilio (SMS) ---
twilio.account-sid={TU_TWILIO_ACCOUNT_SID_AQUI}
twilio.auth-token={TU_TWILIO_AUTH_TOKEN_AQUI}
twilio.phone-number={TU_TWILIO_PHONE_NUMBER_AQUI}

# ==============================================================
# CONFIGURACIï¿½N DE CORREO ELECTRï¿½NICO (GMAIL SMTP)
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Tu direcciï¿½n de correo completa
spring.mail.username={TU_CORREO_GMAIL_AQUI}
# ï¿½OJO! Aquï¿½ NO va tu contraseï¿½a normal. Va la "Contraseï¿½a de Aplicaciï¿½n"
spring.mail.password={TU_PASSWORD_DE_APLICACION_GMAIL_AQUI}

# Propiedades avanzadas de seguridad para Gmail
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ==============================================================
# CONFIGURACIï¿½N PERSONALIZADA DE LA APP (Lï¿½gica de Negocio)
# ==============================================================
# URL de tu Frontend (React/Angular) para enviar en el link de "Click aquï¿½ para resetear"
app.frontend.url={TU_URL_FRONTEND_AQUI_EJ_HTTP_LOCALHOST_3000}

# Tiempo de vida del token de recuperaciï¿½n (ej. 30 minutos)
app.reset-password.expiration-minutes=30

# (Estas ya las tenï¿½as hardcodeadas en el servicio, ahora las puedes controlar desde aquï¿½)
app.verification.code-length=6
app.verification.code-expiration-minutes=10
app.verification.max-attempts=5

# ==============================================================
# CONFIGURACIï¿½N THYMELEAF (Plantillas de Correo)
# ==============================================================
# Indica dï¿½nde buscar los archivos HTML (Por defecto es esta carpeta)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Modo de plantilla y codificaciï¿½n (para que reconozca acentos y ï¿½)
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# IMPORTANTE: Desactiva el cachï¿½ en desarrollo.
# Si estï¿½ en 'true', si cambias el HTML tendrï¿½s que reiniciar el servidor para ver el cambio.
# En producciï¿½n (cuando ya subas la app), cï¿½mbialo a 'true' para que sea mï¿½s rï¿½pido.
spring.thymeleaf.cache=false

# ==============================================================
# Lï¿½MITES DE SUBIDA DE ARCHIVOS (MULTIPART)
# ==============================================================
# Necesario para que Spring Boot no bloquee archivos de mï¿½s de 1MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ==============================================================
# REGLAS DE NEGOCIO (SISTEMA DE ARCHIVOS SEGUROS)
# ==============================================================
# Tiempos de vida definidos en tu lï¿½gica de negocio
app.file.security.sms-token-expiration-minutes=5
app.file.security.sms-max-attempts=3
app.file.security.unlock-duration-hours=24

# ==============================================================
# AZURE BLOB STORAGE
# ==============================================================
# Reemplaza con tus credenciales reales cuando crees tu cuenta de Azure
azure.storage.connection-string={TU_AZURE_CONNECTION_STRING_AQUI}
azure.storage.container-name={TU_AZURE_CONTAINER_NAME_AQUI}
azure.storage.account-name={TU_AZURE_ACCOUNT_NAME_AQUI}
azure.storage.account-key={TU_AZURE_ACCOUNT_KEY_AQUI}

# ==============================================================
# 7. SEGURIDAD CRIPTOGRï¿½FICA (ENVELOPE ENCRYPTION)
# ==============================================================
# Llave Maestra AES-256 en formato Base64.
# IMPORTANTE: No la cambies una vez que subas archivos reales o no podrï¿½s descifrarlos.
app.encryption.master-key={TU_MASTER_KEY_BASE64_AQUI}

# ==============================================================
# AUDITORï¿½A Y RED (PROXY)
# ==============================================================
# Permite a Spring Boot leer la IP real del usuario en lugar de la del localhost
server.forward-headers-strategy=framework