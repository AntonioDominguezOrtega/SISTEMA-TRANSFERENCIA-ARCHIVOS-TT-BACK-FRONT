# ==============================================================
# CONFIGURACIÓN PERSONALIZADA DE LA APP (Lógica de Negocio)
# ==============================================================
# URL de tu Frontend (React/Angular) para enviar en el link de "Click aquí para resetear"
app.frontend.url=http://localhost:3000

# Tiempo de vida del token de recuperación (ej. 30 minutos)
app.reset-password.expiration-minutes=30

# (Estas ya las tenías hardcodeadas en el servicio, ahora las puedes controlar desde aquí)
app.verification.code-length=6
app.verification.code-expiration-minutes=10
app.verification.max-attempts=5

# ==============================================================
# CONFIGURACIÓN THYMELEAF (Plantillas de Correo)
# ==============================================================
# Indica dónde buscar los archivos HTML (Por defecto es esta carpeta)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Modo de plantilla y codificación (para que reconozca acentos y ń)
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# IMPORTANTE: Desactiva el caché en desarrollo.
# Si está en 'true', si cambias el HTML tendrás que reiniciar el servidor para ver el cambio.
# En producción (cuando ya subas la app), cámbialo a 'true' para que sea más rápido.
spring.thymeleaf.cache=false

# ==============================================================
# LÍMITES DE SUBIDA DE ARCHIVOS (MULTIPART)
# ==============================================================
# Necesario para que Spring Boot no bloquee archivos de más de 1MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ==============================================================
# REGLAS DE NEGOCIO (SISTEMA DE ARCHIVOS SEGUROS)
# ==============================================================
# Tiempos de vida definidos en tu lógica de negocio
app.file.security.sms-token-expiration-minutes=5
app.file.security.sms-max-attempts=3
app.file.security.unlock-duration-hours=24

