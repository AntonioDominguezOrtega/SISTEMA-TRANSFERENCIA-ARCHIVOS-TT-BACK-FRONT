spring.application.name=TT_Login

# --- Configuración de la Fuente de Datos (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/auth_sms_db_front?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Driver específico para MySQL (opcional en versiones nuevas, pero recomendado para documentar)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuración de JPA / Hibernate ---
# Muestra las consultas SQL en la consola (útil para depurar)
spring.jpa.show-sql=true

# Actualiza el esquema de la base de datos automáticamente (crea tablas si no existen)
spring.jpa.hibernate.ddl-auto=update

# Especifica el dialecto para que Hibernate genere SQL optimizado para MySQL
spring.jpa.properties.hibernaUSE auth_sms_db;te.dialect=org.hibernate.dialect.MySQLDialect

# --- Configuración JWT ---
# La clave secreta debe ser larga y compleja (mínimo 32 caracteres/256 bits)
